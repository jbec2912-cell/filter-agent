<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Lakeland Toyota → ElevenLabs CSV Filter</title>
  <style>
    body { font-family: Arial; text-align: center; padding: 50px; background: #f0f0f0; }
    h1 { color: #333; }
    p { color: #666; }
    input, button { padding: 15px; font-size: 18px; margin: 10px; }
    button { background: #4caf50; color: white; border: none; cursor: pointer; }
    #status { color: #4caf50; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Lakeland Toyota → ElevenLabs Filter</h1>
  <p>Upload raw CSV to get filtered version for ElevenLabs</p>
  <input type="file" id="file" accept=".csv">
  <button onclick="processFile()">Process & Download</button>
  <p id="status"></p>

  <script>
    async function processFile() {
      const file = document.getElementById('file').files[0];
      if (!file) return alert('Select a file first');

      const status = document.getElementById('status');
      status.textContent = 'Processing...';

      const form = new FormData();
      form.append('file', file);

      try {
        const res = await fetch('/api/filter', { method: 'POST', body: form });
        if (!res.ok) throw new Error('Server error');

        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'Filtered For 11Labs.csv';
        a.click();
        status.textContent = 'Downloaded!';
      } catch (e) {
        status.textContent = 'Error – try again';
      }
    }
  </script>
</body>
</html>
