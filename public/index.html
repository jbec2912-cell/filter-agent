<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Lakeland Toyota → ElevenLabs</title>
  <style>
    body{font-family:Arial;text-align:center;padding:80px;background:#f9f9f9}
    h1{font-size:2.5em}
    input,button{padding:15px;font-size:18px;margin:10px}
    button{background:#0066ff;color:white;border:none;border-radius:8px;cursor:pointer}
  </style>
</head>
<body>
  <h1>Lakeland Toyota → ElevenLabs Filter</h1>
  <p>Upload raw CSV → get perfect ElevenLabs file</p>
  <input type="file" id="f" accept=".csv"><br><br>
  <button onclick="go()">Process & Download</button>
  <p id="s"></p>
  <script>
    async function go(){
      const file=document.getElementById('f').files[0];
      if(!file)return alert("Pick file");
      document.getElementById('s').innerText="Working...";
      const form=new FormData();
      form.append('file',file);
      const r=await fetch('/api/filter',{method:'POST',body:form});
      const blob=await r.blob();
      const a=document.createElement('a');
      a.href=URL.createObjectURL(blob);
      a.download='Filtered For 11Labs.csv';
      a.click();
      document.getElementById('s').innerText="Downloaded!";
    }
  </script>
</body>
</html>
